<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact Family Engineer</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #9b59b6);
            --teal: #23a6d5;
            --pink: #e73c7e;
            --vivid-magenta: #8B008B;
        }

        #puppy-logo { position: fixed; top: 20px; left: 20px; width: 140px; z-index: 9999; mix-blend-mode: multiply; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: gradientBG 21s ease infinite; overflow: hidden;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem; border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center; width: 90%; max-width: 800px; min-height: 520px;
            position: relative;
        }

        /* TRIANGLE VISUALIZATION */
        .triangle-container { position: relative; width: 300px; height: 250px; margin: 20px auto; }
        .node {
            position: absolute; width: 80px; height: 80px;
            background: white; border: 4px solid var(--teal);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 1.8rem; font-weight: bold;
            z-index: 2; transition: all 0.3s;
        }
        .peak { top: 0; left: 50%; transform: translateX(-50%); border-color: var(--pink); }
        .base-l { bottom: 0; left: 0; }
        .base-r { bottom: 0; right: 0; }

        .line { position: absolute; background: #ddd; z-index: 1; }
        .line-l { width: 4px; height: 180px; top: 40px; left: 80px; transform: rotate(35deg); transform-origin: top; }
        .line-r { width: 4px; height: 180px; top: 40px; right: 80px; transform: rotate(-35deg); transform-origin: top; }
        .line-b { height: 4px; width: 180px; bottom: 40px; left: 60px; }

        /* THE RELATIONSHIP OVERLAY */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10000;
        }
        .overlay-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            color: var(--vivid-magenta); font-size: 3rem; font-weight: bold;
        }

        .op-indicator { font-size: 1.2rem; color: #777; font-weight: bold; margin-bottom: 10px; }

        /* BUTTONS */
        .answer-input { font-size: 2.5rem; width: 120px; padding: 10px; border: 4px solid #eee; border-radius: 15px; text-align: center; }
        .mode-btn { padding: 12px 24px; margin: 8px; cursor: pointer; border-radius: 12px; border: none; background: #f0f0f0; font-weight: bold; }
        .active-mode { background: var(--teal); color: white; }
        
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

<img src="assets/BernadoodleLogo.png" id="puppy-logo" alt="Math Puppy">

<div id="success-overlay" onclick="nextRound()">
    <h1 style="color: var(--teal); margin-bottom: 2rem;">Family Bond Confirmed!</h1>
    <div class="overlay-content" id="equation-display"></div>
    <p style="margin-top: 2rem; color: #aaa;">(Tap anywhere to continue)</p>
</div>

<div id="game-container">
    <div id="mode-selector">
        <button class="mode-btn active-mode" onclick="setMode('FILL')">Missing Number</button>
        <button class="mode-btn" onclick="setMode('HUNT')">Imposter Hunt</button>
        <button class="mode-btn" onclick="setMode('OP')">Add or Multiply?</button>
    </div>

    <div id="operation-clue" class="op-indicator">Multiplication Family (×)</div>
    <h2 id="instruction" style="height: 60px;">Solve for the family member!</h2>

    <div id="display-area"></div>

    <div id="control-area" style="margin-top: 20px;">
        <input type="number" id="user-answer" class="answer-input" placeholder="?">
        <div id="options-area" style="display:none;"></div>
    </div>
</div>

<script>
    let currentMode = 'FILL';
    let currentFamily = {};

    function generateFamily(forceFake = false) {
        const isMult = Math.random() > 0.5;
        const a = Math.floor(Math.random() * 9) + 2;
        const b = Math.floor(Math.random() * 9) + 2;
        let type = isMult ? '×' : '+';
        let inv = isMult ? '÷' : '-';
        let c = isMult ? (a * b) : (a + b);
        let isReal = true;

        if (forceFake) {
            c = c + (Math.random() > 0.5 ? 2 : -2);
            isReal = false;
        }
        return { a, b, c, type, inv, isReal };
    }

    function renderTriangle(family, hiddenKey = null) {
        document.getElementById('display-area').innerHTML = `
            <div class="triangle-container">
                <div class="line line-l"></div><div class="line line-r"></div><div class="line line-b"></div>
                <div class="node peak">${hiddenKey === 'c' ? '?' : family.c}</div>
                <div class="node base-l">${hiddenKey === 'a' ? '?' : family.a}</div>
                <div class="node base-r">${hiddenKey === 'b' ? '?' : family.b}</div>
            </div>
        `;
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active-mode'));
        event.target.classList.add('active-mode');
        newRound();
    }

    function newRound() {
        document.getElementById('success-overlay').style.display = 'none';
        const input = document.getElementById('user-answer');
        const options = document.getElementById('options-area');
        const clue = document.getElementById('operation-clue');
        
        input.value = ''; input.style.display = 'none'; options.style.display = 'none';

        if (currentMode === 'FILL') {
            currentFamily = generateFamily(false);
            const hidden = ['a', 'b', 'c'][Math.floor(Math.random() * 3)];
            currentFamily.hidden = hidden;
            clue.innerText = currentFamily.type === '×' ? "Multiplication Family (×)" : "Addition Family (+)";
            renderTriangle(currentFamily, hidden);
            input.style.display = 'inline-block'; input.focus();
        } 
        else if (currentMode === 'HUNT') {
            currentFamily = generateFamily(Math.random() > 0.5);
            clue.innerText = "Check the math carefully!";
            renderTriangle(currentFamily);
            options.style.display = 'block';
            options.innerHTML = `<button class="mode-btn" style="background:#23d5ab;color:white;font-size:1.5rem;" onclick="checkHunt(true)">YES</button>
                                 <button class="mode-btn" style="background:var(--pink);color:white;font-size:1.5rem;" onclick="checkHunt(false)">NO</button>`;
        }
        else { // OP MODE
            currentFamily = generateFamily(false);
            clue.innerText = "Look at the number cluster...";
            renderTriangle(currentFamily);
            options.style.display = 'block';
            options.innerHTML = `<button class="mode-btn" onclick="checkOp('+')">Addition (+)</button>
                                 <button class="mode-btn" onclick="checkOp('×')">Multiplication (×)</button>`;
        }
    }

    function checkAnswer() {
        if (parseInt(document.getElementById('user-answer').value) === currentFamily[currentFamily.hidden]) showOverlay();
        else fail();
    }

    function checkHunt(val) { if (val === currentFamily.isReal) showOverlay(); else fail(); }
    function checkOp(op) { if (op === currentFamily.type) showOverlay(); else fail(); }

    function showOverlay() {
        const {a, b, c, type, inv} = currentFamily;
        const display = document.getElementById('equation-display');
        display.innerHTML = `
            <div>${a} ${type} ${b} = ${c}<br>${b} ${type} ${a} = ${c}</div>
            <div>${c} ${inv} ${a} = ${b}<br>${c} ${inv} ${b} = ${a}</div>
        `;
        document.getElementById('success-overlay').style.display = 'flex';
    }

    function nextRound() { newRound(); }

    function fail() {
        document.getElementById('game-container').classList.add('shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);
    }

    window.addEventListener('keydown', (e) => { if (e.key === 'Enter' && currentMode === 'FILL') checkAnswer(); });
    newRound();
</script>
</body>
</html>
