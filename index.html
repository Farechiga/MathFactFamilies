<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Fact Families Game</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #9b59b6);
            --teal: #23a6d5;
            --pink: #e73c7e;
            --vivid-magenta: #FF00FF; 
            --overlay-bg: rgba(20, 20, 20, 0.88);
        }

        #puppy-logo { position: fixed; top: 20px; left: 20px; width: 140px; z-index: 9999; mix-blend-mode: multiply; }
        
        /* SCORING */
        #scoreboard {
            position: fixed; top: 20px; right: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px; border-radius: 20px;
            font-size: 1.5rem; font-weight: bold; color: var(--teal);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 9999;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: gradientBG 17s ease infinite; overflow: hidden;
        }

        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem; border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center; width: 90%; max-width: 800px; min-height: 520px;
            position: relative; transition: border 0.3s;
            border: 8px solid transparent;
        }

        /* TRIANGLE VIZ */
        .triangle-container { position: relative; width: 300px; height: 250px; margin: 20px auto; }
        .node {
            position: absolute; width: 80px; height: 80px;
            background: white; border: 4px solid var(--teal);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 1.8rem; font-weight: bold;
            z-index: 2;
        }
        .peak { top: 0; left: 50%; transform: translateX(-50%); border-color: var(--pink); }
        .base-l { bottom: 0; left: 0; }
        .base-r { bottom: 0; right: 0; }

        .line { position: absolute; background: #ddd; z-index: 1; }
        .line-l { width: 4px; height: 180px; top: 40px; left: 80px; transform: rotate(35deg); transform-origin: top; }
        .line-r { width: 4px; height: 180px; top: 40px; right: 80px; transform: rotate(-35deg); transform-origin: top; }
        .line-b { height: 4px; width: 180px; bottom: 40px; left: 60px; }

        /* REINFORCEMENT OVERLAY */
        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 10000;
        }
        .overlay-content {
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
            color: var(--vivid-magenta); font-size: 3.5rem; font-weight: bold;
            text-shadow: 0 0 15px rgba(255,0,255,0.4);
        }
        .equation-col { display: flex; flex-direction: column; gap: 15px; text-align: center; }

        #instruction { 
            font-size: 2rem; color: #444; height: 80px; 
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 0;
        }
        .instr-tag { background: #eee; padding: 8px 20px; border-radius: 12px; color: var(--pink); font-weight: 800; letter-spacing: 1px;}

        /* CONTROLS */
        .answer-input { font-size: 2.5rem; width: 140px; padding: 10px; border: 4px solid #eee; border-radius: 15px; text-align: center; outline: none; }
        .mode-btn { padding: 12px 24px; margin: 8px; cursor: pointer; border-radius: 12px; border: none; background: #f0f0f0; font-weight: bold; font-size: 1rem; }
        .active-mode { background: var(--teal); color: white; }
        
        .correct-pulse { border-color: #23d5ab !important; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
    </style>
</head>
<body>

<img src="assets/BernadoodleLogo.png" id="puppy-logo" alt="Math Puppy">
<div id="scoreboard">Points: 0</div>

<div id="success-overlay" onclick="newRound()">
    <h1 style="color: white; margin-bottom: 3rem; font-size: 2.5rem;">Family Relationships Identified!</h1>
    <div class="overlay-content" id="equation-display"></div>
    <p style="margin-top: 4rem; color: #666; font-size: 1.2rem;">(Tap to continue)</p>
</div>

<div id="game-container">
    <div id="mode-selector">
        <button class="mode-btn active-mode" onclick="setMode('FILL')">Missing Number</button>
        <button class="mode-btn" onclick="setMode('HUNT')">Imposter Hunt</button>
        <button class="mode-btn" onclick="setMode('OP')">Add or Multiply?</button>
    </div>

    <h2 id="instruction"></h2>

    <div id="display-area"></div>

    <div id="control-area" style="margin-top: 20px;">
        <input type="number" id="user-answer" class="answer-input" placeholder="?">
        <div id="options-area" style="display:none;"></div>
    </div>
</div>

<script>
let currentMode = 'FILL';
    let currentFamily = { a: 0, b: 0, c: 0, hidden: null };
    let points = 0;
    
    function generateFamily() {
        const isMult = Math.random() > 0.5;
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 10) + 1;
        if (isMult) return { a, b, c: a * b };
        return { a, b, c: a + b };
    }
    
    function isValidFamily(a, b, c) {
        const isAddition = (parseInt(a) + parseInt(b) === parseInt(c));
        const isMultiplication = (parseInt(a) * parseInt(b) === parseInt(c));
        return { isAddition, isMultiplication, valid: isAddition || isMultiplication };
    }
    
    function renderTriangle(family, hiddenKey = null) {
        const area = document.getElementById('display-area');
        area.innerHTML = `
            <div class="triangle-container" id="main-triangle">
                <div class="line line-l"></div>
                <div class="line line-r"></div>
                <div class="line line-b"></div>
                <div class="symbol-hint" id="success-op" style="top:50%; left:50%; transform:translate(-50%,-50%); font-size: 2rem; opacity: 0; transition: 0.3s; font-weight: bold; color: #e73c7e;"></div>
                
                <div class="node peak">${hiddenKey === 'c' ? '?' : family.c}</div>
                <div class="node base-l">${hiddenKey === 'a' ? '?' : family.a}</div>
                <div class="node base-r">${hiddenKey === 'b' ? '?' : family.b}</div>
            </div>
        `;
    }
    
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active-mode'));
        event.target.classList.add('active-mode');
        newRound();
    }

    function newRound() {
        const input = document.getElementById('user-answer');
        const options = document.getElementById('options-area');
        input.value = '';
        document.getElementById('success-overlay').style.display = 'none';
        
        if (currentMode === 'FILL') {
            currentFamily = generateFamily();
            const keys = ['a', 'b', 'c'];
            currentFamily.hidden = keys[Math.floor(Math.random() * 3)];
            input.style.display = 'inline-block';
            options.style.display = 'none';
            renderTriangle(currentFamily, currentFamily.hidden);
            document.getElementById('instruction').innerText = "What number completes the family?";
            input.focus();
        } 
        else if (currentMode === 'HUNT') {
            const isReal = Math.random() > 0.5;
            if (isReal) {
                currentFamily = generateFamily();
            } else {
                currentFamily = { a: Math.floor(Math.random()*10)+1, b: Math.floor(Math.random()*10)+1, c: Math.floor(Math.random()*50)+1 };
                if (isValidFamily(currentFamily.a, currentFamily.b, currentFamily.c).valid) currentFamily.c += 1;
            }
            input.style.display = 'none';
            options.style.display = 'block';
            renderTriangle(currentFamily);
            document.getElementById('instruction').innerText = "IS THIS A REAL FAMILY?";
            options.innerHTML = `
                <button class="mode-btn" style="background:#23d5ab; color:white; width:120px;" onclick="checkHunt(true)">YES</button>
                <button class="mode-btn" style="background:#e73c7e; color:white; width:120px;" onclick="checkHunt(false)">NO</button>
            `;
        }
        else if (currentMode === 'OP') {
            currentFamily = generateFamily();
            input.style.display = 'none';
            options.style.display = 'block';
            renderTriangle(currentFamily);
            document.getElementById('instruction').innerText = "Add or Multiply?";
            options.innerHTML = `
                <button class="mode-btn" onclick="checkOp('+')">Addition (+)</button>
                <button class="mode-btn" onclick="checkOp('×')">Multiplication (×)</button>
            `;
        }
    }
    
    function checkAnswer() {
        const val = parseInt(document.getElementById('user-answer').value);
        const correctVal = currentFamily[currentFamily.hidden];
        if (val === correctVal) {
            const results = isValidFamily(currentFamily.a, currentFamily.b, currentFamily.c);
            showSuccess(results.isMultiplication ? '×' : '+');
        } else {
            failShake();
        }
    }

    function checkOp(chosenOp) {
        const results = isValidFamily(currentFamily.a, currentFamily.b, currentFamily.c);
        if ((chosenOp === '+' && results.isAddition) || (chosenOp === '×' && results.isMultiplication)) {
            showSuccess(chosenOp);
        } else {
            failShake();
        }
    }
    
    function checkHunt(userSaidYes) {
        const results = isValidFamily(currentFamily.a, currentFamily.b, currentFamily.c);
        if (userSaidYes === results.valid) {
            showSuccess(results.isMultiplication ? '×' : '+');
        } else {
            failShake();
        }
    }
    
    function showSuccess(opSymbol) {
        points += 10;
        document.getElementById('scoreboard').innerText = `Points: ${points}`;
        
        const hint = document.getElementById('success-op');
        if(hint) {
            hint.innerText = opSymbol;
            hint.style.opacity = '1';
        }

        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        // Show Relationship Overlay
        const overlay = document.getElementById('success-overlay');
        const display = document.getElementById('equation-display');
        const results = isValidFamily(currentFamily.a, currentFamily.b, currentFamily.c);
        
        let equations = "";
        if (results.isAddition) {
            equations = `
                <div class="equation-col"><div>${currentFamily.a} + ${currentFamily.b} = ${currentFamily.c}</div><div>${currentFamily.c} - ${currentFamily.a} = ${currentFamily.b}</div></div>
                <div class="equation-col"><div>${currentFamily.b} + ${currentFamily.a} = ${currentFamily.c}</div><div>${currentFamily.c} - ${currentFamily.b} = ${currentFamily.a}</div></div>`;
        } else {
            equations = `
                <div class="equation-col"><div>${currentFamily.a} × ${currentFamily.b} = ${currentFamily.c}</div><div>${currentFamily.c} ÷ ${currentFamily.a} = ${currentFamily.b}</div></div>
                <div class="equation-col"><div>${currentFamily.b} × ${currentFamily.a} = ${currentFamily.c}</div><div>${currentFamily.c} ÷ ${currentFamily.b} = ${currentFamily.a}</div></div>`;
        }
        
        display.innerHTML = equations;
        overlay.style.display = 'flex';
    }

    function failShake() {
        const container = document.getElementById('game-container');
        container.classList.add('shake');
        setTimeout(() => container.classList.remove('shake'), 500);
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && currentMode === 'FILL') checkAnswer();
    });

    // START THE GAME
    newRound();
</script>
</body>
</html>
